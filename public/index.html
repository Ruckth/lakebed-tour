<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=https://quiet-meadow-8e2df2f0d7.lakebed.app">
    <link rel="canonical" href="https://quiet-meadow-8e2df2f0d7.lakebed.app">
    <title>Opening OpenHouse Desk</title>
    <style>
      :root {
        color: #17211f;
        background: #f5f7f2;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        max-width: 680px;
        border-radius: 12px;
        background: white;
        padding: 32px;
        box-shadow: 0 20px 60px rgb(15 23 42 / 10%);
      }

      p:first-child {
        margin: 0 0 8px;
        color: #0d6b63;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: #0a0f0e;
        font-size: clamp(36px, 7vw, 64px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        color: #4b5563;
        font-size: 18px;
        line-height: 1.6;
      }

      code {
        border-radius: 6px;
        background: #eef3ed;
        color: #17211f;
        padding: 2px 6px;
        font-size: 0.9em;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: #0d6b63;
        color: white;
        font-weight: 700;
        padding: 0 18px;
        text-decoration: none;
      }

      a:hover {
        background: #084943;
      }

  <body>
    <main>
      <p>Lakebed capsule</p>
